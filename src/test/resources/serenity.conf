webdriver {
  driver = chrome
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    chromeOptions {
      args = ["--headless", "--no-sandbox", "--disable-dev-shm-usage"]
      w3c = false
    }
  }
}

chrome {
  switches = [
    "--no-sandbox",
    "--disable-dev-shm-usage"
  ]
}

serenity {
  take.screenshots = "FOR_EACH_ACTION"
  logging = "INFO"
  console.headings = "ascii"
  report {
    show.pie.charts = true
    show.step.details = true
  }
}
